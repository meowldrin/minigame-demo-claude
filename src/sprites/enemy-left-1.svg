<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Head -->
  <circle cx="16" cy="7" r="7" fill="#c33"/>
  <!-- Eye (left side only) -->
  <circle cx="11" cy="6" r="2" fill="#ffcc00"/>
  <!-- Body -->
  <rect x="10" y="14" width="12" height="8" fill="#c33"/>
  <!-- Lead arm (swung up) -->
  <rect x="5"  y="10" width="5" height="4" fill="#8a1a1a"/>
  <!-- Trailing arm -->
  <rect x="21" y="12" width="4" height="4" fill="#8a1a1a"/>
  <!-- Legs (stride) -->
  <rect x="9"  y="21" width="4" height="8" fill="#8a1a1a"/>
  <rect x="19" y="22" width="4" height="6" fill="#8a1a1a"/>
</svg>
