<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">

  <!-- ── ROW 0: facing FRONT (down / up) ───────────────── -->

  <!-- front, frame 0 (standing) -->
  <g transform="translate(0,0)">
    <circle cx="16" cy="7"  r="7" fill="#c33"/>
    <circle cx="13" cy="6"  r="2" fill="#ffcc00"/>
    <circle cx="19" cy="6"  r="2" fill="#ffcc00"/>
    <rect x="10" y="14" width="12" height="8" fill="#c33"/>
    <rect x="5"  y="12" width="5"  height="4" fill="#8a1a1a"/>
    <rect x="22" y="12" width="5"  height="4" fill="#8a1a1a"/>
    <rect x="10" y="22" width="4"  height="7" fill="#8a1a1a"/>
    <rect x="18" y="22" width="4"  height="7" fill="#8a1a1a"/>
  </g>

  <!-- front, frame 1 (walking) -->
  <g transform="translate(32,0)">
    <circle cx="16" cy="7"  r="7" fill="#c33"/>
    <circle cx="13" cy="6"  r="2" fill="#ffcc00"/>
    <circle cx="19" cy="6"  r="2" fill="#ffcc00"/>
    <rect x="10" y="14" width="12" height="8" fill="#c33"/>
    <rect x="5"  y="10" width="5"  height="4" fill="#8a1a1a"/>
    <rect x="22" y="10" width="5"  height="4" fill="#8a1a1a"/>
    <rect x="9"  y="21" width="4"  height="8" fill="#8a1a1a"/>
    <rect x="19" y="22" width="4"  height="6" fill="#8a1a1a"/>
  </g>

  <!-- ── ROW 1: facing RIGHT ────────────────────────────── -->

  <!-- right, frame 0 (standing) -->
  <g transform="translate(0,32)">
    <circle cx="16" cy="7"  r="7" fill="#c33"/>
    <circle cx="21" cy="6"  r="2" fill="#ffcc00"/>
    <rect x="10" y="14" width="12" height="8" fill="#c33"/>
    <rect x="22" y="12" width="5"  height="4" fill="#8a1a1a"/>
    <rect x="7"  y="14" width="4"  height="4" fill="#8a1a1a"/>
    <rect x="10" y="22" width="4"  height="7" fill="#8a1a1a"/>
    <rect x="18" y="22" width="4"  height="7" fill="#8a1a1a"/>
  </g>

  <!-- right, frame 1 (walking) -->
  <g transform="translate(32,32)">
    <circle cx="16" cy="7"  r="7" fill="#c33"/>
    <circle cx="21" cy="6"  r="2" fill="#ffcc00"/>
    <rect x="10" y="14" width="12" height="8" fill="#c33"/>
    <rect x="22" y="10" width="5"  height="4" fill="#8a1a1a"/>
    <rect x="7"  y="12" width="4"  height="4" fill="#8a1a1a"/>
    <rect x="9"  y="21" width="4"  height="8" fill="#8a1a1a"/>
    <rect x="19" y="22" width="4"  height="6" fill="#8a1a1a"/>
  </g>

  <!-- ── ROW 2: facing LEFT ─────────────────────────────── -->

  <!-- left, frame 0 (standing) -->
  <g transform="translate(0,64)">
    <circle cx="16" cy="7"  r="7" fill="#c33"/>
    <circle cx="11" cy="6"  r="2" fill="#ffcc00"/>
    <rect x="10" y="14" width="12" height="8" fill="#c33"/>
    <rect x="5"  y="12" width="5"  height="4" fill="#8a1a1a"/>
    <rect x="21" y="14" width="4"  height="4" fill="#8a1a1a"/>
    <rect x="10" y="22" width="4"  height="7" fill="#8a1a1a"/>
    <rect x="18" y="22" width="4"  height="7" fill="#8a1a1a"/>
  </g>

  <!-- left, frame 1 (walking) -->
  <g transform="translate(32,64)">
    <circle cx="16" cy="7"  r="7" fill="#c33"/>
    <circle cx="11" cy="6"  r="2" fill="#ffcc00"/>
    <rect x="10" y="14" width="12" height="8" fill="#c33"/>
    <rect x="5"  y="10" width="5"  height="4" fill="#8a1a1a"/>
    <rect x="21" y="12" width="4"  height="4" fill="#8a1a1a"/>
    <rect x="9"  y="21" width="4"  height="8" fill="#8a1a1a"/>
    <rect x="19" y="22" width="4"  height="6" fill="#8a1a1a"/>
  </g>

</svg>
