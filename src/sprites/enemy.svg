<svg xmlns="http://www.w3.org/2000/svg" width="64" height="96" viewBox="0 0 64 96">

  <!--
    Layout: 2 cols × 3 rows, each cell 32×32
    Col 0 = frame 0 (standing)  Col 32 = frame 1 (walking)
    Row 0  = front   Row 32 = right   Row 64 = left
  -->

  <!-- ══ ROW 0 — facing FRONT ══════════════════════════════════════════ -->

  <g transform="translate(0,0)">
    <!-- Head (large, lumpy goblin) -->
    <ellipse cx="16" cy="8"  rx="8.5" ry="8"           fill="#8fb829"/>
    <!-- Head shadow/texture -->
    <ellipse cx="13" cy="6"  rx="3"   ry="2.5"         fill="#7a9e22"/>
    <ellipse cx="20" cy="5"  rx="2.5" ry="2"           fill="#7a9e22"/>
    <!-- Left ear (pointy) -->
    <polygon points="7,5 4,0 8,8"                       fill="#8fb829"/>
    <polygon points="7,5 5,1 8,8"                       fill="#6a8a1a"/>
    <!-- Right ear -->
    <polygon points="25,5 28,0 24,8"                    fill="#8fb829"/>
    <polygon points="25,5 27,1 24,8"                    fill="#6a8a1a"/>
    <!-- Left eye -->
    <ellipse cx="12" cy="7.5" rx="2.5" ry="2.8"        fill="#ffee00"/>
    <circle  cx="12.5" cy="8" r="1.6"                  fill="#cc8800"/>
    <ellipse cx="12.5" cy="8" rx="0.8" ry="1.2"        fill="#111"/>
    <circle  cx="13"   cy="7" r="0.45"                 fill="white"/>
    <!-- Right eye -->
    <ellipse cx="20" cy="7.5" rx="2.5" ry="2.8"        fill="#ffee00"/>
    <circle  cx="20.5" cy="8" r="1.6"                  fill="#cc8800"/>
    <ellipse cx="20.5" cy="8" rx="0.8" ry="1.2"        fill="#111"/>
    <circle  cx="21"   cy="7" r="0.45"                 fill="white"/>
    <!-- Brow ridge (menacing) -->
    <path d="M9 5.5 Q12 4 14 5.5"
          stroke="#4a6a10" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M18 5.5 Q20 4 23 5.5"
          stroke="#4a6a10" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Nose (wide, flat) -->
    <ellipse cx="16" cy="12" rx="2.5" ry="1.5"         fill="#6a8a18"/>
    <circle  cx="14.5" cy="12" r="0.8"                 fill="#4a6a10"/>
    <circle  cx="17.5" cy="12" r="0.8"                 fill="#4a6a10"/>
    <!-- Mouth (fang grin) -->
    <path d="M11 15.5 Q16 18.5 21 15.5"
          stroke="#3a5a0a" stroke-width="1" fill="rgba(30,15,5,0.7)"
          stroke-linecap="round"/>
    <!-- Fangs -->
    <polygon points="13.5,15.5 12.5,18 14.5,18"        fill="white"/>
    <polygon points="18.5,15.5 17.5,18 19.5,18"        fill="white"/>
    <!-- Body (stocky) -->
    <rect x="8"  y="18" width="16" height="9"  rx="3"  fill="#7aaa1a"/>
    <rect x="9"  y="19" width="4"  height="5"  rx="1"  fill="rgba(255,255,255,0.15)"/>
    <!-- Left arm (raised/menacing, frame 0) -->
    <rect x="3"  y="14" width="5"  height="9"  rx="2"  fill="#8fb829"/>
    <!-- Claws left -->
    <line x1="3"  y1="23" x2="2"  y2="26" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="5"  y1="23" x2="4"  y2="27" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="7"  y1="23" x2="7"  y2="26" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Right arm (raised, frame 0) -->
    <rect x="24" y="14" width="5"  height="9"  rx="2"  fill="#8fb829"/>
    <!-- Claws right -->
    <line x1="25" y1="23" x2="25" y2="26" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="27" y1="23" x2="27" y2="27" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="29" y1="23" x2="30" y2="26" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Left leg -->
    <rect x="9"  y="27" width="5.5" height="5" rx="1.5" fill="#5a8010"/>
    <!-- Right leg -->
    <rect x="17.5" y="27" width="5.5" height="5" rx="1.5" fill="#5a8010"/>
    <!-- Feet (big, clunky) -->
    <ellipse cx="11.5" cy="31.5" rx="4.5" ry="1.5"     fill="#3a5a08"/>
    <ellipse cx="20.5" cy="31.5" rx="4.5" ry="1.5"     fill="#3a5a08"/>
  </g>

  <g transform="translate(32,0)">
    <!-- Head -->
    <ellipse cx="16" cy="8"  rx="8.5" ry="8"           fill="#8fb829"/>
    <ellipse cx="13" cy="6"  rx="3"   ry="2.5"         fill="#7a9e22"/>
    <ellipse cx="20" cy="5"  rx="2.5" ry="2"           fill="#7a9e22"/>
    <!-- Ears -->
    <polygon points="7,5 4,0 8,8"                       fill="#8fb829"/>
    <polygon points="7,5 5,1 8,8"                       fill="#6a8a1a"/>
    <polygon points="25,5 28,0 24,8"                    fill="#8fb829"/>
    <polygon points="25,5 27,1 24,8"                    fill="#6a8a1a"/>
    <!-- Eyes -->
    <ellipse cx="12" cy="7.5" rx="2.5" ry="2.8"        fill="#ffee00"/>
    <circle  cx="12.5" cy="8" r="1.6"                  fill="#cc8800"/>
    <ellipse cx="12.5" cy="8" rx="0.8" ry="1.2"        fill="#111"/>
    <circle  cx="13"   cy="7" r="0.45"                 fill="white"/>
    <ellipse cx="20" cy="7.5" rx="2.5" ry="2.8"        fill="#ffee00"/>
    <circle  cx="20.5" cy="8" r="1.6"                  fill="#cc8800"/>
    <ellipse cx="20.5" cy="8" rx="0.8" ry="1.2"        fill="#111"/>
    <circle  cx="21"   cy="7" r="0.45"                 fill="white"/>
    <!-- Brows -->
    <path d="M9 5.5 Q12 4 14 5.5"
          stroke="#4a6a10" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M18 5.5 Q20 4 23 5.5"
          stroke="#4a6a10" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <ellipse cx="16" cy="12" rx="2.5" ry="1.5"         fill="#6a8a18"/>
    <circle  cx="14.5" cy="12" r="0.8"                 fill="#4a6a10"/>
    <circle  cx="17.5" cy="12" r="0.8"                 fill="#4a6a10"/>
    <!-- Mouth -->
    <path d="M11 15.5 Q16 18.5 21 15.5"
          stroke="#3a5a0a" stroke-width="1" fill="rgba(30,15,5,0.7)"
          stroke-linecap="round"/>
    <polygon points="13.5,15.5 12.5,18 14.5,18"        fill="white"/>
    <polygon points="18.5,15.5 17.5,18 19.5,18"        fill="white"/>
    <!-- Body -->
    <rect x="8"  y="18" width="16" height="9"  rx="3"  fill="#7aaa1a"/>
    <rect x="9"  y="19" width="4"  height="5"  rx="1"  fill="rgba(255,255,255,0.15)"/>
    <!-- Left arm (swung higher, walking) -->
    <rect x="3"  y="11" width="5"  height="9"  rx="2"  fill="#8fb829"/>
    <line x1="3"  y1="20" x2="2"  y2="23" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="5"  y1="20" x2="4"  y2="24" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="7"  y1="20" x2="7"  y2="23" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Right arm (lower, walking) -->
    <rect x="24" y="17" width="5"  height="9"  rx="2"  fill="#8fb829"/>
    <line x1="25" y1="26" x2="25" y2="29" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="27" y1="26" x2="27" y2="30" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="29" y1="26" x2="30" y2="29" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Legs (stride) -->
    <rect x="8"  y="27" width="5.5" height="5" rx="1.5" fill="#5a8010"/>
    <rect x="18.5" y="27" width="5.5" height="5" rx="1.5" fill="#5a8010"/>
    <!-- Feet -->
    <ellipse cx="10.5" cy="31.5" rx="4.5" ry="1.5"     fill="#3a5a08"/>
    <ellipse cx="21.5" cy="31.5" rx="4.5" ry="1.5"     fill="#3a5a08"/>
  </g>

  <!-- ══ ROW 1 — facing RIGHT (profile) ════════════════════════════════ -->

  <g transform="translate(0,32)">
    <!-- Head (profile) -->
    <ellipse cx="17" cy="8"  rx="8"   ry="7.5"         fill="#8fb829"/>
    <ellipse cx="15" cy="6"  rx="3"   ry="2"           fill="#7a9e22"/>
    <!-- Right ear tip (facing right = ear on left side, hidden; we see back of head) -->
    <polygon points="25,4 29,-1 25,9"                   fill="#8fb829"/>
    <polygon points="25,4 28,0 25,9"                    fill="#6a8a1a"/>
    <!-- Eye (side profile, right) -->
    <ellipse cx="21" cy="7.5" rx="2.2" ry="2.5"        fill="#ffee00"/>
    <circle  cx="21.5" cy="8" r="1.5"                  fill="#cc8800"/>
    <ellipse cx="21.5" cy="8" rx="0.7" ry="1.1"        fill="#111"/>
    <circle  cx="22"   cy="7" r="0.4"                  fill="white"/>
    <!-- Brow -->
    <path d="M18 5 Q21 3.5 24 5"
          stroke="#4a6a10" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Nose (prominent snout, profile) -->
    <ellipse cx="25" cy="12" rx="2.5" ry="2"           fill="#6a8a18"/>
    <circle  cx="26" cy="12" r="0.9"                   fill="#4a6a10"/>
    <!-- Mouth (profile, slight snarl) -->
    <path d="M22 15 Q25 17 25 15"
          stroke="#3a5a0a" stroke-width="1" fill="none" stroke-linecap="round"/>
    <polygon points="23,15 22.5,17.5 24,17.5"           fill="white"/>
    <!-- Body (side, narrower) -->
    <rect x="10" y="18" width="12" height="9"  rx="3"  fill="#7aaa1a"/>
    <!-- Lead arm (frame 0, forward/up) -->
    <rect x="19" y="14" width="5"  height="8"  rx="2"  fill="#8fb829"/>
    <line x1="20" y1="22" x2="19" y2="25" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="22" y1="22" x2="22" y2="26" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="24" y1="22" x2="25" y2="25" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Rear arm (behind body, just visible) -->
    <rect x="8"  y="18" width="4"  height="7"  rx="1.5" fill="#6a8a18"/>
    <!-- Legs (profile stride) -->
    <rect x="11" y="27" width="5"  height="5" rx="1.5" fill="#5a8010"/>
    <rect x="14" y="27" width="5"  height="5" rx="1.5" fill="#4a7008"/>
    <!-- Foot (large, profile) -->
    <ellipse cx="14" cy="31.5" rx="5" ry="1.5"         fill="#3a5a08"/>
  </g>

  <g transform="translate(32,32)">
    <!-- Head -->
    <ellipse cx="17" cy="8"  rx="8"   ry="7.5"         fill="#8fb829"/>
    <ellipse cx="15" cy="6"  rx="3"   ry="2"           fill="#7a9e22"/>
    <polygon points="25,4 29,-1 25,9"                   fill="#8fb829"/>
    <polygon points="25,4 28,0 25,9"                    fill="#6a8a1a"/>
    <!-- Eye -->
    <ellipse cx="21" cy="7.5" rx="2.2" ry="2.5"        fill="#ffee00"/>
    <circle  cx="21.5" cy="8" r="1.5"                  fill="#cc8800"/>
    <ellipse cx="21.5" cy="8" rx="0.7" ry="1.1"        fill="#111"/>
    <circle  cx="22"   cy="7" r="0.4"                  fill="white"/>
    <!-- Brow -->
    <path d="M18 5 Q21 3.5 24 5"
          stroke="#4a6a10" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <ellipse cx="25" cy="12" rx="2.5" ry="2"           fill="#6a8a18"/>
    <circle  cx="26" cy="12" r="0.9"                   fill="#4a6a10"/>
    <!-- Mouth -->
    <path d="M22 15 Q25 17 25 15"
          stroke="#3a5a0a" stroke-width="1" fill="none" stroke-linecap="round"/>
    <polygon points="23,15 22.5,17.5 24,17.5"           fill="white"/>
    <!-- Body -->
    <rect x="10" y="18" width="12" height="9"  rx="3"  fill="#7aaa1a"/>
    <!-- Lead arm (higher, walking) -->
    <rect x="19" y="11" width="5"  height="8"  rx="2"  fill="#8fb829"/>
    <line x1="20" y1="19" x2="19" y2="22" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="22" y1="19" x2="22" y2="23" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="24" y1="19" x2="25" y2="22" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Rear arm -->
    <rect x="8"  y="21" width="4"  height="7"  rx="1.5" fill="#6a8a18"/>
    <!-- Legs (wider stride) -->
    <rect x="10" y="27" width="5"  height="5" rx="1.5" fill="#5a8010"/>
    <rect x="15" y="27" width="5"  height="5" rx="1.5" fill="#4a7008"/>
    <!-- Foot -->
    <ellipse cx="12.5" cy="31.5" rx="5.5" ry="1.5"     fill="#3a5a08"/>
  </g>

  <!-- ══ ROW 2 — facing LEFT (mirrored profile) ════════════════════════ -->

  <g transform="translate(0,64)">
    <!-- Head (profile facing left) -->
    <ellipse cx="15" cy="8"  rx="8"   ry="7.5"         fill="#8fb829"/>
    <ellipse cx="17" cy="6"  rx="3"   ry="2"           fill="#7a9e22"/>
    <!-- Left ear tip -->
    <polygon points="7,4 3,-1 7,9"                      fill="#8fb829"/>
    <polygon points="7,4 4,0 7,9"                       fill="#6a8a1a"/>
    <!-- Eye (left side profile) -->
    <ellipse cx="11" cy="7.5" rx="2.2" ry="2.5"        fill="#ffee00"/>
    <circle  cx="10.5" cy="8" r="1.5"                  fill="#cc8800"/>
    <ellipse cx="10.5" cy="8" rx="0.7" ry="1.1"        fill="#111"/>
    <circle  cx="10"   cy="7" r="0.4"                  fill="white"/>
    <!-- Brow -->
    <path d="M8 5 Q11 3.5 14 5"
          stroke="#4a6a10" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Nose (snout, left profile) -->
    <ellipse cx="7"  cy="12" rx="2.5" ry="2"           fill="#6a8a18"/>
    <circle  cx="6"  cy="12" r="0.9"                   fill="#4a6a10"/>
    <!-- Mouth -->
    <path d="M7 15 Q10 17 7 15"
          stroke="#3a5a0a" stroke-width="1" fill="none" stroke-linecap="round"/>
    <polygon points="9,15 8,17.5 9.5,17.5"              fill="white"/>
    <!-- Body -->
    <rect x="10" y="18" width="12" height="9"  rx="3"  fill="#7aaa1a"/>
    <!-- Lead arm (frame 0, left side forward) -->
    <rect x="8"  y="14" width="5"  height="8"  rx="2"  fill="#8fb829"/>
    <line x1="8"  y1="22" x2="7"  y2="25" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="22" x2="10" y2="26" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="12" y1="22" x2="13" y2="25" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Rear arm -->
    <rect x="20" y="18" width="4"  height="7"  rx="1.5" fill="#6a8a18"/>
    <!-- Legs -->
    <rect x="12" y="27" width="5"  height="5" rx="1.5" fill="#4a7008"/>
    <rect x="17" y="27" width="5"  height="5" rx="1.5" fill="#5a8010"/>
    <!-- Foot -->
    <ellipse cx="18" cy="31.5" rx="5" ry="1.5"         fill="#3a5a08"/>
  </g>

  <g transform="translate(32,64)">
    <!-- Head -->
    <ellipse cx="15" cy="8"  rx="8"   ry="7.5"         fill="#8fb829"/>
    <ellipse cx="17" cy="6"  rx="3"   ry="2"           fill="#7a9e22"/>
    <polygon points="7,4 3,-1 7,9"                      fill="#8fb829"/>
    <polygon points="7,4 4,0 7,9"                       fill="#6a8a1a"/>
    <!-- Eye -->
    <ellipse cx="11" cy="7.5" rx="2.2" ry="2.5"        fill="#ffee00"/>
    <circle  cx="10.5" cy="8" r="1.5"                  fill="#cc8800"/>
    <ellipse cx="10.5" cy="8" rx="0.7" ry="1.1"        fill="#111"/>
    <circle  cx="10"   cy="7" r="0.4"                  fill="white"/>
    <!-- Brow -->
    <path d="M8 5 Q11 3.5 14 5"
          stroke="#4a6a10" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <ellipse cx="7"  cy="12" rx="2.5" ry="2"           fill="#6a8a18"/>
    <circle  cx="6"  cy="12" r="0.9"                   fill="#4a6a10"/>
    <!-- Mouth -->
    <path d="M7 15 Q10 17 7 15"
          stroke="#3a5a0a" stroke-width="1" fill="none" stroke-linecap="round"/>
    <polygon points="9,15 8,17.5 9.5,17.5"              fill="white"/>
    <!-- Body -->
    <rect x="10" y="18" width="12" height="9"  rx="3"  fill="#7aaa1a"/>
    <!-- Lead arm (higher, walking) -->
    <rect x="8"  y="11" width="5"  height="8"  rx="2"  fill="#8fb829"/>
    <line x1="8"  y1="19" x2="7"  y2="22" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="10" y1="19" x2="10" y2="23" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="12" y1="19" x2="13" y2="22" stroke="#4a6a10" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Rear arm -->
    <rect x="20" y="21" width="4"  height="7"  rx="1.5" fill="#6a8a18"/>
    <!-- Legs (stride) -->
    <rect x="11" y="27" width="5"  height="5" rx="1.5" fill="#4a7008"/>
    <rect x="18" y="27" width="5"  height="5" rx="1.5" fill="#5a8010"/>
    <!-- Foot -->
    <ellipse cx="19.5" cy="31.5" rx="5.5" ry="1.5"     fill="#3a5a08"/>
  </g>

</svg>
