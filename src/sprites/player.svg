<svg xmlns="http://www.w3.org/2000/svg" width="64" height="128" viewBox="0 0 64 128">

  <!--
    Layout: 2 cols × 4 rows, each cell 32×32
    Col 0 = frame 0 (standing)  Col 32 = frame 1 (walking)
    Row 0  = down   Row 32 = up   Row 64 = right   Row 96 = left
  -->

  <!-- ══ ROW 0 — facing DOWN ════════════════════════════════════════════ -->

  <g transform="translate(0,0)">
    <!-- Hair -->
    <rect x="9"  y="1"  width="14" height="5"  rx="3"   fill="#5c3a1a"/>
    <!-- Head -->
    <ellipse cx="16" cy="9" rx="6.5" ry="7"            fill="#f5d08a"/>
    <!-- Eye whites -->
    <ellipse cx="13" cy="8.5" rx="1.6" ry="2"          fill="white"/>
    <ellipse cx="19" cy="8.5" rx="1.6" ry="2"          fill="white"/>
    <!-- Irises -->
    <circle  cx="13.3" cy="9"   r="1.1"                fill="#3a6aa0"/>
    <circle  cx="19.3" cy="9"   r="1.1"                fill="#3a6aa0"/>
    <!-- Eye highlights -->
    <circle  cx="13.8" cy="8.3" r="0.45"               fill="white"/>
    <circle  cx="19.8" cy="8.3" r="0.45"               fill="white"/>
    <!-- Nose -->
    <ellipse cx="16"  cy="12.5" rx="1" ry="0.6"        fill="#d49060"/>
    <!-- Smile -->
    <path d="M13.5 14.5 Q16 16.5 18.5 14.5"
          stroke="#a06040" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    <!-- Neck -->
    <rect x="14" y="16" width="4" height="2"            fill="#e8a870"/>
    <!-- Shirt -->
    <rect x="9"  y="18" width="14" height="7" rx="2"   fill="#4a9ed8"/>
    <rect x="10" y="19" width="4"  height="4" rx="1"   fill="rgba(255,255,255,0.22)"/>
    <!-- Belt -->
    <rect x="9"  y="25" width="14" height="1.5"        fill="#2a5a8a"/>
    <!-- Left arm (neutral) -->
    <rect x="5.5" y="18" width="3.5" height="7" rx="1.5" fill="#4a9ed8"/>
    <ellipse cx="7.2" cy="26"    rx="2"   ry="1.4"     fill="#e8a870"/>
    <!-- Right arm (neutral) -->
    <rect x="23"  y="18" width="3.5" height="7" rx="1.5" fill="#4a9ed8"/>
    <ellipse cx="24.8" cy="26"   rx="2"   ry="1.4"     fill="#e8a870"/>
    <!-- Pants -->
    <rect x="10" y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <rect x="17" y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <!-- Shoes -->
    <ellipse cx="12.5" cy="31.5" rx="3.5" ry="1.1"     fill="#1a100a"/>
    <ellipse cx="19.5" cy="31.5" rx="3.5" ry="1.1"     fill="#1a100a"/>
  </g>

  <g transform="translate(32,0)">
    <!-- Hair -->
    <rect x="9"  y="1"  width="14" height="5"  rx="3"   fill="#5c3a1a"/>
    <!-- Head -->
    <ellipse cx="16" cy="9" rx="6.5" ry="7"            fill="#f5d08a"/>
    <!-- Eye whites -->
    <ellipse cx="13" cy="8.5" rx="1.6" ry="2"          fill="white"/>
    <ellipse cx="19" cy="8.5" rx="1.6" ry="2"          fill="white"/>
    <!-- Irises -->
    <circle  cx="13.3" cy="9"   r="1.1"                fill="#3a6aa0"/>
    <circle  cx="19.3" cy="9"   r="1.1"                fill="#3a6aa0"/>
    <!-- Highlights -->
    <circle  cx="13.8" cy="8.3" r="0.45"               fill="white"/>
    <circle  cx="19.8" cy="8.3" r="0.45"               fill="white"/>
    <!-- Nose -->
    <ellipse cx="16"  cy="12.5" rx="1" ry="0.6"        fill="#d49060"/>
    <!-- Smile -->
    <path d="M13.5 14.5 Q16 16.5 18.5 14.5"
          stroke="#a06040" stroke-width="0.8" fill="none" stroke-linecap="round"/>
    <!-- Neck -->
    <rect x="14" y="16" width="4" height="2"            fill="#e8a870"/>
    <!-- Shirt -->
    <rect x="9"  y="18" width="14" height="7" rx="2"   fill="#4a9ed8"/>
    <rect x="10" y="19" width="4"  height="4" rx="1"   fill="rgba(255,255,255,0.22)"/>
    <!-- Belt -->
    <rect x="9"  y="25" width="14" height="1.5"        fill="#2a5a8a"/>
    <!-- Left arm (swung forward/up) -->
    <rect x="5.5" y="15" width="3.5" height="7" rx="1.5" fill="#4a9ed8"/>
    <ellipse cx="7.2" cy="23"    rx="2"   ry="1.4"     fill="#e8a870"/>
    <!-- Right arm (swung back/down) -->
    <rect x="23"  y="21" width="3.5" height="7" rx="1.5" fill="#4a9ed8"/>
    <ellipse cx="24.8" cy="29"   rx="2"   ry="1.4"     fill="#e8a870"/>
    <!-- Pants (stride: left leg forward, right leg back) -->
    <rect x="9"  y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <rect x="18" y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <!-- Shoes -->
    <ellipse cx="11.5" cy="31.5" rx="3.5" ry="1.1"     fill="#1a100a"/>
    <ellipse cx="20.5" cy="31.5" rx="3.5" ry="1.1"     fill="#1a100a"/>
  </g>

  <!-- ══ ROW 1 — facing UP (back) ══════════════════════════════════════ -->

  <g transform="translate(0,32)">
    <!-- Hair (full top of head visible from behind) -->
    <ellipse cx="16" cy="5"  rx="7"  ry="5.5"          fill="#5c3a1a"/>
    <!-- Head/neck back (darker skin) -->
    <ellipse cx="16" cy="10" rx="6.5" ry="7"           fill="#d4944a"/>
    <!-- Shirt back -->
    <rect x="9"  y="18" width="14" height="7" rx="2"   fill="#3a82b8"/>
    <rect x="10" y="19" width="4"  height="4" rx="1"   fill="rgba(255,255,255,0.12)"/>
    <!-- Belt -->
    <rect x="9"  y="25" width="14" height="1.5"        fill="#2a5a8a"/>
    <!-- Left arm (neutral) -->
    <rect x="5.5" y="18" width="3.5" height="7" rx="1.5" fill="#3a82b8"/>
    <ellipse cx="7.2" cy="26"    rx="2"   ry="1.4"     fill="#c8844a"/>
    <!-- Right arm (neutral) -->
    <rect x="23"  y="18" width="3.5" height="7" rx="1.5" fill="#3a82b8"/>
    <ellipse cx="24.8" cy="26"   rx="2"   ry="1.4"     fill="#c8844a"/>
    <!-- Pants -->
    <rect x="10" y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <rect x="17" y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <!-- Shoes -->
    <ellipse cx="12.5" cy="31.5" rx="3.5" ry="1.1"     fill="#1a100a"/>
    <ellipse cx="19.5" cy="31.5" rx="3.5" ry="1.1"     fill="#1a100a"/>
  </g>

  <g transform="translate(32,32)">
    <!-- Hair -->
    <ellipse cx="16" cy="5"  rx="7"  ry="5.5"          fill="#5c3a1a"/>
    <!-- Head back -->
    <ellipse cx="16" cy="10" rx="6.5" ry="7"           fill="#d4944a"/>
    <!-- Shirt back -->
    <rect x="9"  y="18" width="14" height="7" rx="2"   fill="#3a82b8"/>
    <rect x="10" y="19" width="4"  height="4" rx="1"   fill="rgba(255,255,255,0.12)"/>
    <!-- Belt -->
    <rect x="9"  y="25" width="14" height="1.5"        fill="#2a5a8a"/>
    <!-- Left arm (swung forward) -->
    <rect x="5.5" y="15" width="3.5" height="7" rx="1.5" fill="#3a82b8"/>
    <ellipse cx="7.2" cy="23"    rx="2"   ry="1.4"     fill="#c8844a"/>
    <!-- Right arm (swung back) -->
    <rect x="23"  y="21" width="3.5" height="7" rx="1.5" fill="#3a82b8"/>
    <ellipse cx="24.8" cy="29"   rx="2"   ry="1.4"     fill="#c8844a"/>
    <!-- Pants (stride) -->
    <rect x="9"  y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <rect x="18" y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <!-- Shoes -->
    <ellipse cx="11.5" cy="31.5" rx="3.5" ry="1.1"     fill="#1a100a"/>
    <ellipse cx="20.5" cy="31.5" rx="3.5" ry="1.1"     fill="#1a100a"/>
  </g>

  <!-- ══ ROW 2 — facing RIGHT (profile) ════════════════════════════════ -->

  <g transform="translate(0,64)">
    <!-- Hair (profile) -->
    <ellipse cx="17" cy="5"  rx="6.5" ry="5"           fill="#5c3a1a"/>
    <!-- Head -->
    <ellipse cx="17" cy="10" rx="6"   ry="7"           fill="#f5d08a"/>
    <!-- Right ear (visible on profile) -->
    <ellipse cx="23" cy="10" rx="1.5" ry="2"           fill="#e8a870"/>
    <!-- Eye (one, side profile) -->
    <ellipse cx="19" cy="8.5" rx="1.4" ry="1.8"        fill="white"/>
    <circle  cx="19.5" cy="9" r="1"                    fill="#3a6aa0"/>
    <circle  cx="20"   cy="8.3" r="0.4"                fill="white"/>
    <!-- Nose protrusion -->
    <ellipse cx="23.5" cy="12" rx="1.5" ry="1"         fill="#e8a870"/>
    <!-- Neck -->
    <rect x="14" y="16" width="4" height="2"            fill="#e8a870"/>
    <!-- Shirt (narrower, side view) -->
    <rect x="11" y="18" width="10" height="7" rx="2"   fill="#4a9ed8"/>
    <rect x="12" y="19" width="3"  height="4" rx="1"   fill="rgba(255,255,255,0.22)"/>
    <!-- Belt -->
    <rect x="11" y="25" width="10" height="1.5"        fill="#2a5a8a"/>
    <!-- Rear arm (neutral) -->
    <rect x="11" y="19" width="3" height="6" rx="1.5"  fill="#3a82b8"/>
    <ellipse cx="12.5" cy="25.5" rx="2" ry="1.4"       fill="#e8a870"/>
    <!-- Pants (single stride, profile) -->
    <rect x="12" y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <rect x="15" y="26.5" width="5" height="5.5" rx="1" fill="#1a2a5a"/>
    <!-- Shoes -->
    <ellipse cx="14.5" cy="31.5" rx="4" ry="1.2"       fill="#1a100a"/>
  </g>

  <g transform="translate(32,64)">
    <!-- Hair -->
    <ellipse cx="17" cy="5"  rx="6.5" ry="5"           fill="#5c3a1a"/>
    <!-- Head -->
    <ellipse cx="17" cy="10" rx="6"   ry="7"           fill="#f5d08a"/>
    <!-- Ear -->
    <ellipse cx="23" cy="10" rx="1.5" ry="2"           fill="#e8a870"/>
    <!-- Eye -->
    <ellipse cx="19" cy="8.5" rx="1.4" ry="1.8"        fill="white"/>
    <circle  cx="19.5" cy="9" r="1"                    fill="#3a6aa0"/>
    <circle  cx="20"   cy="8.3" r="0.4"                fill="white"/>
    <!-- Nose -->
    <ellipse cx="23.5" cy="12" rx="1.5" ry="1"         fill="#e8a870"/>
    <!-- Neck -->
    <rect x="14" y="16" width="4" height="2"            fill="#e8a870"/>
    <!-- Shirt -->
    <rect x="11" y="18" width="10" height="7" rx="2"   fill="#4a9ed8"/>
    <rect x="12" y="19" width="3"  height="4" rx="1"   fill="rgba(255,255,255,0.22)"/>
    <!-- Belt -->
    <rect x="11" y="25" width="10" height="1.5"        fill="#2a5a8a"/>
    <!-- Rear arm (swung back) -->
    <rect x="11" y="21" width="3" height="6" rx="1.5"  fill="#3a82b8"/>
    <ellipse cx="12.5" cy="27.5" rx="2" ry="1.4"       fill="#e8a870"/>
    <!-- Pants (stride: front leg forward) -->
    <rect x="10" y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <rect x="16" y="26.5" width="5" height="5.5" rx="1" fill="#1a2a5a"/>
    <!-- Shoe (front) -->
    <ellipse cx="12.5" cy="31.5" rx="4.5" ry="1.2"     fill="#1a100a"/>
  </g>

  <!-- ══ ROW 3 — facing LEFT (profile, mirrored) ═══════════════════════ -->

  <g transform="translate(0,96)">
    <!-- Hair (profile, facing left) -->
    <ellipse cx="15" cy="5"  rx="6.5" ry="5"           fill="#5c3a1a"/>
    <!-- Head -->
    <ellipse cx="15" cy="10" rx="6"   ry="7"           fill="#f5d08a"/>
    <!-- Left ear -->
    <ellipse cx="9"  cy="10" rx="1.5" ry="2"           fill="#e8a870"/>
    <!-- Eye -->
    <ellipse cx="13" cy="8.5" rx="1.4" ry="1.8"        fill="white"/>
    <circle  cx="12.5" cy="9" r="1"                    fill="#3a6aa0"/>
    <circle  cx="12"   cy="8.3" r="0.4"                fill="white"/>
    <!-- Nose protrusion -->
    <ellipse cx="8.5" cy="12" rx="1.5" ry="1"          fill="#e8a870"/>
    <!-- Neck -->
    <rect x="14" y="16" width="4" height="2"            fill="#e8a870"/>
    <!-- Shirt -->
    <rect x="11" y="18" width="10" height="7" rx="2"   fill="#4a9ed8"/>
    <rect x="18" y="19" width="3"  height="4" rx="1"   fill="rgba(255,255,255,0.22)"/>
    <!-- Belt -->
    <rect x="11" y="25" width="10" height="1.5"        fill="#2a5a8a"/>
    <!-- Rear arm (neutral, on right side from view) -->
    <rect x="18" y="19" width="3" height="6" rx="1.5"  fill="#3a82b8"/>
    <ellipse cx="19.5" cy="25.5" rx="2" ry="1.4"       fill="#e8a870"/>
    <!-- Pants -->
    <rect x="12" y="26.5" width="5" height="5.5" rx="1" fill="#1a2a5a"/>
    <rect x="15" y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <!-- Shoe (front) -->
    <ellipse cx="17.5" cy="31.5" rx="4" ry="1.2"       fill="#1a100a"/>
  </g>

  <g transform="translate(32,96)">
    <!-- Hair -->
    <ellipse cx="15" cy="5"  rx="6.5" ry="5"           fill="#5c3a1a"/>
    <!-- Head -->
    <ellipse cx="15" cy="10" rx="6"   ry="7"           fill="#f5d08a"/>
    <!-- Ear -->
    <ellipse cx="9"  cy="10" rx="1.5" ry="2"           fill="#e8a870"/>
    <!-- Eye -->
    <ellipse cx="13" cy="8.5" rx="1.4" ry="1.8"        fill="white"/>
    <circle  cx="12.5" cy="9" r="1"                    fill="#3a6aa0"/>
    <circle  cx="12"   cy="8.3" r="0.4"                fill="white"/>
    <!-- Nose -->
    <ellipse cx="8.5" cy="12" rx="1.5" ry="1"          fill="#e8a870"/>
    <!-- Neck -->
    <rect x="14" y="16" width="4" height="2"            fill="#e8a870"/>
    <!-- Shirt -->
    <rect x="11" y="18" width="10" height="7" rx="2"   fill="#4a9ed8"/>
    <rect x="18" y="19" width="3"  height="4" rx="1"   fill="rgba(255,255,255,0.22)"/>
    <!-- Belt -->
    <rect x="11" y="25" width="10" height="1.5"        fill="#2a5a8a"/>
    <!-- Rear arm (swung back) -->
    <rect x="18" y="21" width="3" height="6" rx="1.5"  fill="#3a82b8"/>
    <ellipse cx="19.5" cy="27.5" rx="2" ry="1.4"       fill="#e8a870"/>
    <!-- Pants (stride: front leg forward = right side from view) -->
    <rect x="12" y="26.5" width="5" height="5.5" rx="1" fill="#1a2a5a"/>
    <rect x="17" y="26.5" width="5" height="5.5" rx="1" fill="#2a3a6a"/>
    <!-- Shoe (front) -->
    <ellipse cx="19.5" cy="31.5" rx="4.5" ry="1.2"     fill="#1a100a"/>
  </g>

</svg>
